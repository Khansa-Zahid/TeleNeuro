plugins {
    id "com.android.application"
    id "kotlin-android"
    // ✅ The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"  // ✅ Ensure Google services plugin is included for Firebase
}

android {
    namespace = "com.example.untitled"  // ✅ Update to your actual package name
    compileSdk = 34  // ✅ Ensure this matches the latest SDK version

    ndkVersion = flutter.ndkVersion

    defaultConfig {
        applicationId = "com.example.untitled"  // ✅ Update with your real application ID
        minSdk = 23
        targetSdk = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
        freeCompilerArgs += ["-Xjvm-default=all"]
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug  // ✅ Replace with actual signing config for production
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:33.9.0')  // ✅ Latest Firebase BOM
    implementation 'com.google.firebase:firebase-auth' // ✅ Add Firebase Auth if needed
    implementation 'com.google.firebase:firebase-firestore' // ✅ Add Firestore if needed
    implementation 'com.google.firebase:firebase-messaging' // ✅ Add Firebase Cloud Messaging if needed
}
